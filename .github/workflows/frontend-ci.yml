name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "crm-web/**"
      - "docs/frontend/**"
      - "backend/shared/**"
  pull_request:
    paths:
      - "crm-web/**"
      - "docs/frontend/**"
      - "backend/shared/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "crm-web/package-lock.json"

      - name: Install
        run: npm ci

      - name: Canonical roles JSON ↔ generated TS
        run: npm run check:canonical-roles-sync

      - name: Fail-fast workspace prerequisites
        run: npm run check:workspace-prereqs

      - name: Fail-fast route parity contract
        run: npm run check:route-parity

      - name: Check dictionaries-page size limit
        run: npm run check:dictionaries-page-size

      - name: Lint affected
        run: npx nx affected -t lint --base=origin/main --head=HEAD --parallel=2

      - name: Test affected
        run: npx nx affected -t test --base=origin/main --head=HEAD --parallel=2

      - name: Build affected
        run: npx nx affected -t build --base=origin/main --head=HEAD --parallel=2

  smoke-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: crm-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "crm-web/package-lock.json"

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run srm-front smoke e2e
        run: npm run e2e:smoke
