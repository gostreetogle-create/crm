<app-page-shell>
  <app-content-card title="Список материалов">
    @if (vm().error) {
      <p class="loadError" role="alert">{{ vm().error }}</p>
    }
    <crud-layout
      title="Материалы"
      [columns]="materialColumns"
      [data]="vm().materialsData"
      [loading]="vm().loading"
      [canEdit]="permissions.crud().canEdit"
      [canDelete]="permissions.crud().canDelete"
      [toolbarActions]="toolbarTpl"
      [formActions]="formTpl"
      (edit)="startEdit($event)"
      (delete)="delete($event)"
      data-testid="materials-table"
    >
    </crud-layout>
  </app-content-card>

  @if (!isEditDialogOpen()) {
    <app-content-card *appHasPermission="'crud.create'" title="Добавление материала">
      <form id="materials-create-form" [formGroup]="form" (ngSubmit)="submitCreate()" class="formGrid">
        <ng-container *ngTemplateOutlet="materialFields"></ng-container>
      </form>
    </app-content-card>
  }
</app-page-shell>

<ng-template #toolbarTpl>
  <app-ui-button *appHasPermission="'crud.create'" data-testid="materials-create-new" (clicked)="startCreate()">
    + Новый материал
  </app-ui-button>
</ng-template>

<ng-template #formTpl>
  <app-ui-button *appHasPermission="'crud.create'" data-testid="materials-reset" variant="soft" (clicked)="startCreate()">
    Сбросить
  </app-ui-button>
  <app-ui-button *appHasPermission="'crud.create'" data-testid="materials-submit" [type]="'submit'" [form]="'materials-create-form'">
    Создать материал
  </app-ui-button>
</ng-template>

<ng-template #materialFields>
  <app-ui-form-field
    label="Название"
    [required]="true"
    [invalid]="isInvalid('name')"
    [errorText]="hasError('name') ? errorText('name') : ''"
  >
    <input type="text" formControlName="name" />
  </app-ui-form-field>

  <app-ui-form-field label="Код">
    <input type="text" formControlName="code" />
  </app-ui-form-field>

  <app-ui-form-field label="Плотность (кг/м3)">
    <input type="number" formControlName="densityKgM3" />
  </app-ui-form-field>

  <app-ui-form-field label="Цвет (название)">
    <input type="text" formControlName="colorName" />
  </app-ui-form-field>

  <app-hex-rgb-field [control]="form.controls.colorHex"></app-hex-rgb-field>

  <app-ui-form-field label="Заметки" [wide]="true">
    <textarea rows="3" formControlName="notes"></textarea>
  </app-ui-form-field>

  <app-ui-checkbox-field class="checkbox" label="Активен" formControlName="isActive">
  </app-ui-checkbox-field>
</ng-template>

@if (isEditDialogOpen()) {
  <ui-modal
    title="Редактирование материала"
    [content]="editContent"
    [actions]="editActions"
    (close)="closeEditDialog()"
    size="md"
  >
  </ui-modal>
}

<ng-template #editContent>
  <form id="materials-edit-form" [formGroup]="form" (ngSubmit)="submitEdit()" class="formGrid">
    <ng-container *ngTemplateOutlet="materialFields"></ng-container>
  </form>
</ng-template>

<ng-template #editActions>
  <app-ui-button variant="soft" (clicked)="closeEditDialog()">Отмена</app-ui-button>
  <app-ui-button type="submit" [form]="'materials-edit-form'">Сохранить изменения</app-ui-button>
</ng-template>
