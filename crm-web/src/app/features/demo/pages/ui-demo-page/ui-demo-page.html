<app-page-shell>
  <app-content-card title="Demo">
    <p class="meta">Последнее действие: {{ lastAction() }}</p>
  </app-content-card>

  <app-content-card title="Роль пользователя (demo)">
    <div class="roleRow">
      <label class="roleLabel" for="demo-role">Текущая роль</label>
      <select
        id="demo-role"
        class="roleSelect"
        [value]="permissions.role()"
        (change)="onRoleChange($any($event.target).value)"
      >
        @for (option of roleOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>
  </app-content-card>

  <app-content-card title="Состояния интерфейса">
    <section class="stateGrid">
      <article class="stateCard stateCardInfo">
        <h4 class="stateCardTitle">
          <span class="stateCardIcon stateCardIcon--accent" aria-hidden="true"><svg lucideLoader2 [size]="18"></svg></span>
          Loading
        </h4>
      </article>
      <article class="stateCard stateCardOk">
        <h4 class="stateCardTitle">
          <span class="stateCardIcon stateCardIcon--affirm" aria-hidden="true"><svg lucideCircleCheck [size]="18"></svg></span>
          Success
        </h4>
      </article>
      <article class="stateCard stateCardWarn">
        <h4 class="stateCardTitle">
          <span class="stateCardIcon stateCardIcon--warn" aria-hidden="true"><svg lucideInbox [size]="18"></svg></span>
          Empty
        </h4>
      </article>
      <article class="stateCard stateCardErr">
        <h4 class="stateCardTitle">
          <span class="stateCardIcon stateCardIcon--danger" aria-hidden="true"><svg lucideCircleAlert [size]="18"></svg></span>
          Error
        </h4>
      </article>
    </section>
  </app-content-card>

  <app-content-card title="Кнопки (единый стиль)">
    <div class="buttonRow">
      <app-ui-button>Primary</app-ui-button>
      <app-ui-button variant="soft">Soft</app-ui-button>
      <app-ui-button variant="danger">Danger</app-ui-button>
      <app-ui-button [disabled]="true">Disabled</app-ui-button>
    </div>
    <div class="buttonRow">
      <app-ui-button>
        <span class="btnWithIcon btnWithIcon--affirm"><svg lucidePlus [size]="18"></svg>Создать</span>
      </app-ui-button>
      <app-ui-button variant="soft">
        <span class="btnWithIcon btnWithIcon--affirm"><svg lucideSave [size]="18"></svg>Сохранить</span>
      </app-ui-button>
      <app-ui-button variant="danger">
        <span class="btnWithIcon btnWithIcon--danger"><svg lucideTrash2 [size]="18"></svg>Удалить</span>
      </app-ui-button>
      <app-ui-button variant="soft">
        <span class="btnWithIcon btnWithIcon--accent"><svg lucideDownload [size]="18"></svg>Экспорт CSV</span>
      </app-ui-button>
    </div>
  </app-content-card>

  <app-content-card title="Фильтры (как в модели полей)">
    <app-filters-bar
      searchPlaceholder="Поиск..."
      [sortOptions]="sortOptions"
      [filterOptions]="filterOptions()"
      selectedSort="name"
      selectedFilter="all"
      (searchChange)="onSearch($event)"
      (sortChange)="onSortChange($any($event))"
      (filterChange)="onFilterCategory($any($event))"
    ></app-filters-bar>
  </app-content-card>

  <app-content-card title="" [hideTitle]="true">
    <crud-layout
      title="Универсальный CRUD"
      [showHeader]="false"
      [showCardLabel]="true"
      [showNameSearch]="true"
      [showCreateAction]="permissions.crud().canCreate"
      [canCreate]="permissions.crud().canCreate"
      createAriaLabel="Добавить строку"
      createTitle="Добавить строку"
      [columns]="columns"
      [data]="universalCrudData()"
      [showExcelActions]="true"
      [canDownloadTemplate]="permissions.can('excel.template')"
      [canImportExcel]="permissions.can('excel.import')"
      [canExportExcel]="permissions.can('excel.export')"
      [canView]="true"
      [canDuplicate]="permissions.crud().canDuplicate"
      [canEdit]="permissions.crud().canEdit"
      [canDelete]="permissions.crud().canDelete"
      (create)="addUniversalDemoRow()"
      (downloadTemplate)="downloadDemoTemplateExcel()"
      (importExcel)="onDemoExcelImported($event)"
      (exportExcel)="exportDemoExcel()"
      (view)="onView($event)"
      (duplicate)="onDuplicate($event)"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
    ></crud-layout>
    @if (demoExcelStatus()) {
      <p class="importStatus">{{ demoExcelStatus() }}</p>
    }
  </app-content-card>

  <app-content-card title="Форма + quick-add">
    <form id="demo-main-form" class="formGrid" [formGroup]="form" (ngSubmit)="submitMainForm()">
      <app-ui-form-field
        label="Название"
        [required]="true"
        [invalid]="hasMainError('name')"
        [errorText]="hasMainError('name') ? 'Минимум 2 символа' : ''"
      >
        <input type="text" formControlName="name" />
      </app-ui-form-field>

      <app-ui-form-field label="Категория" [required]="true">
        <div class="inlineRow">
          <select formControlName="category">
            @for (option of categoryOptions(); track option) {
              <option [value]="option">{{ option }}</option>
            }
          </select>
          <app-ui-button type="button" variant="primary" [square]="true" (clicked)="openQuickAdd()" aria-label="Добавить категорию">
            <span class="squareIconTone squareIconTone--affirm"><svg lucidePlus [size]="18"></svg></span>
          </app-ui-button>
        </div>
      </app-ui-form-field>
    </form>

    <div class="actions">
      <app-ui-button variant="soft" (clicked)="form.reset({ name: '', category: form.controls.category.value })">
        <span class="btnWithIcon btnWithIcon--muted"><svg lucideRotateCcw [size]="18"></svg>Сбросить</span>
      </app-ui-button>
      <app-ui-button [type]="'submit'" [form]="'demo-main-form'">
        <span class="btnWithIcon btnWithIcon--affirm"><svg lucidePlus [size]="18"></svg>Создать запись</span>
      </app-ui-button>
    </div>
  </app-content-card>

  <app-content-card title="Карточки товаров (витрина)">
    <div class="productShowcaseTop">
      <app-filters-bar
        searchPlaceholder="Поиск по товарам / артикулу..."
        [sortOptions]="productSortOptions"
        [filterOptions]="productCategoryOptions()"
        [selectedSort]="productSort()"
        [selectedFilter]="productCategory()"
        (searchChange)="onProductSearch($event)"
        (sortChange)="onProductSortChange($any($event))"
        (filterChange)="onProductCategory($any($event))"
      ></app-filters-bar>
    </div>

    <div class="productGrid">
      @for (p of visibleProducts(); track p.id) {
        <app-product-card
          [title]="p.title"
          [subtitle]="p.category"
          skuLabel="Артикул"
          [skuValue]="p.sku"
          [price]="p.price.toLocaleString('ru-RU') + ' ₽'"
          [imageSrc]="'https://picsum.photos/seed/' + p.imageSeed + '/640/640'"
        >
          <div product-actions>
            <app-ui-button variant="soft" [square]="true" aria-label="В избранное">
              <span class="squareIconTone squareIconTone--warn"><svg lucideStar [size]="18"></svg></span>
            </app-ui-button>
            <app-ui-button variant="soft" [square]="true" aria-label="В корзину">
              <span class="squareIconTone squareIconTone--accent"><svg lucideShoppingCart [size]="18"></svg></span>
            </app-ui-button>
          </div>
        </app-product-card>
      }
    </div>

    <app-ui-pagination
      [page]="productPage()"
      [pageCount]="productPageCount()"
      (pageChange)="onProductPageChange($event)"
    ></app-ui-pagination>
  </app-content-card>
</app-page-shell>

<ui-modal
  *ngIf="quickAddOpen()"
  title="Quick-add категории"
  [content]="quickAddContent"
  [actions]="quickAddActions"
  size="sm"
  [closeOnBackdrop]="false"
  (close)="closeQuickAdd()"
></ui-modal>

<ng-template #quickAddContent>
  <form id="quick-add-form" [formGroup]="quickAddForm" (ngSubmit)="confirmQuickAdd()" class="formGrid">
    <app-ui-form-field
      label="Новая категория"
      [required]="true"
      [invalid]="quickAddForm.controls.name.invalid"
      [errorText]="quickAddFormSubmitAttempted() && quickAddForm.controls.name.invalid ? 'Минимум 2 символа' : ''"
    >
      <input type="text" formControlName="name" />
    </app-ui-form-field>
  </form>
</ng-template>

<ng-template #quickAddActions>
  <app-ui-button variant="soft" (clicked)="closeQuickAdd()">
    <span class="btnWithIcon btnWithIcon--muted"><svg lucideX [size]="18"></svg>Отмена</span>
  </app-ui-button>
  <app-ui-button type="submit" [form]="'quick-add-form'">
    <span class="btnWithIcon btnWithIcon--affirm"><svg lucideCheck [size]="18"></svg>Добавить и выбрать</span>
  </app-ui-button>
</ng-template>
