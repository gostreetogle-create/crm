<app-page-shell>
  <app-content-card title="Справочник: форма и габаритные размеры">
    <crud-layout
      title="Форма и габаритные размеры"
      [columns]="geometryColumns"
      [data]="vm().geometriesData"
      [canEdit]="permissions.crud().canEdit"
      [canDelete]="permissions.crud().canDelete"
      [toolbarActions]="toolbarTpl"
      [formActions]="formTpl"
      (edit)="openEditDialog($event)"
      (delete)="delete($event)"
      data-testid="geometries-table"
    >
    </crud-layout>
  </app-content-card>

  @if (!vm().isEditDialogOpen) {
    <app-content-card *appHasPermission="'crud.create'" title="Добавление формы и габаритных размеров">
      <form id="geometry-create-form" [formGroup]="form" (ngSubmit)="submitCreate()" class="formGrid">
        <app-ui-form-field
          label="Название"
          [required]="true"
          [invalid]="isInvalid('name')"
          [errorText]="hasError('name') ? errorText('name') : ''"
        >
          <input type="text" formControlName="name" />
        </app-ui-form-field>

      <app-ui-form-field
        label="Тип геометрии"
        [required]="true"
        [invalid]="isInvalid('shapeKey')"
        [errorText]="hasError('shapeKey') ? errorText('shapeKey') : ''"
      >
        <select formControlName="shapeKey">
          <option *ngFor="let s of shapeOptions" [value]="s.value">{{ s.label }}</option>
        </select>
      </app-ui-form-field>

      <app-ui-form-field
        label="Высота (мм)"
        [invalid]="isInvalid('heightMm')"
        [errorText]="hasError('heightMm') ? errorText('heightMm') : ''"
      >
        <input type="number" formControlName="heightMm" />
      </app-ui-form-field>

      <app-ui-form-field
        label="Длина (мм)"
        [invalid]="isInvalid('lengthMm')"
        [errorText]="hasError('lengthMm') ? errorText('lengthMm') : ''"
      >
        <input type="number" formControlName="lengthMm" />
      </app-ui-form-field>

      <app-ui-form-field
        label="Ширина (мм)"
        [invalid]="isInvalid('widthMm')"
        [errorText]="hasError('widthMm') ? errorText('widthMm') : ''"
      >
        <input type="number" formControlName="widthMm" />
      </app-ui-form-field>

      <app-ui-form-field
        label="Диаметр (мм)"
        [invalid]="isInvalid('diameterMm')"
        [errorText]="hasError('diameterMm') ? errorText('diameterMm') : ''"
      >
        <input type="number" formControlName="diameterMm" />
      </app-ui-form-field>

      <app-ui-form-field
        label="Толщина (мм)"
        [invalid]="isInvalid('thicknessMm')"
        [errorText]="hasError('thicknessMm') ? errorText('thicknessMm') : ''"
      >
        <input type="number" formControlName="thicknessMm" />
      </app-ui-form-field>

      <app-ui-form-field label="Заметки" [wide]="true">
        <textarea rows="3" formControlName="notes"></textarea>
      </app-ui-form-field>

        <app-ui-checkbox-field class="checkbox" label="Активна" formControlName="isActive">
        </app-ui-checkbox-field>

      </form>
    </app-content-card>
  }
</app-page-shell>

<ng-template #toolbarTpl>
  <app-ui-button *appHasPermission="'crud.create'" data-testid="geometries-create-new" (clicked)="startCreate()">
    + Новая запись
  </app-ui-button>
</ng-template>

<ng-template #formTpl>
  <app-ui-button *appHasPermission="'crud.create'" data-testid="geometries-reset" variant="soft" (clicked)="startCreate()">
    Сбросить
  </app-ui-button>
  <app-ui-button *appHasPermission="'crud.create'" data-testid="geometries-submit" [type]="'submit'" [form]="'geometry-create-form'">
    Создать запись
  </app-ui-button>
</ng-template>

<ui-modal
  *ngIf="vm().isEditDialogOpen"
  title="Редактирование формы и габаритных размеров"
  [content]="editContent"
  [actions]="editActions"
  [closeOnBackdrop]="false"
  (close)="closeEditDialog()"
  size="md"
>
</ui-modal>

<ng-template #editContent>
  <form id="geometry-edit-form" [formGroup]="form" (ngSubmit)="submitEdit()" class="formGrid">
    <app-ui-form-field
      label="Название"
      [required]="true"
      [invalid]="isInvalid('name')"
      [errorText]="hasError('name') ? errorText('name') : ''"
    >
      <input type="text" formControlName="name" />
    </app-ui-form-field>

    <app-ui-form-field
      label="Тип геометрии"
      [required]="true"
      [invalid]="isInvalid('shapeKey')"
      [errorText]="hasError('shapeKey') ? errorText('shapeKey') : ''"
    >
      <select formControlName="shapeKey">
        <option *ngFor="let s of shapeOptions" [value]="s.value">{{ s.label }}</option>
      </select>
    </app-ui-form-field>

    <app-ui-form-field
      label="Высота (мм)"
      [invalid]="isInvalid('heightMm')"
      [errorText]="hasError('heightMm') ? errorText('heightMm') : ''"
    >
      <input type="number" formControlName="heightMm" />
    </app-ui-form-field>

    <app-ui-form-field
      label="Длина (мм)"
      [invalid]="isInvalid('lengthMm')"
      [errorText]="hasError('lengthMm') ? errorText('lengthMm') : ''"
    >
      <input type="number" formControlName="lengthMm" />
    </app-ui-form-field>

    <app-ui-form-field
      label="Ширина (мм)"
      [invalid]="isInvalid('widthMm')"
      [errorText]="hasError('widthMm') ? errorText('widthMm') : ''"
    >
      <input type="number" formControlName="widthMm" />
    </app-ui-form-field>

    <app-ui-form-field
      label="Диаметр (мм)"
      [invalid]="isInvalid('diameterMm')"
      [errorText]="hasError('diameterMm') ? errorText('diameterMm') : ''"
    >
      <input type="number" formControlName="diameterMm" />
    </app-ui-form-field>

    <app-ui-form-field
      label="Толщина (мм)"
      [invalid]="isInvalid('thicknessMm')"
      [errorText]="hasError('thicknessMm') ? errorText('thicknessMm') : ''"
    >
      <input type="number" formControlName="thicknessMm" />
    </app-ui-form-field>

    <app-ui-form-field label="Заметки" [wide]="true">
      <textarea rows="3" formControlName="notes"></textarea>
    </app-ui-form-field>

    <app-ui-checkbox-field class="checkbox" label="Активна" formControlName="isActive">
    </app-ui-checkbox-field>
  </form>
</ng-template>

<ng-template #editActions>
  <app-ui-button data-testid="geometries-edit-cancel" variant="soft" (clicked)="closeEditDialog()">
    Отмена
  </app-ui-button>
  <app-ui-button data-testid="geometries-edit-submit" type="submit" [form]="'geometry-edit-form'">
    Сохранить изменения
  </app-ui-button>
</ng-template>
