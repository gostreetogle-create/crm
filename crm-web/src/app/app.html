@if (session.isAuthenticated()) {
  <app-app-header>

      <app-theme-picker></app-theme-picker>
    } @placeholder {
      <span>Theme...</span>
    }
  </app-app-header>
}

<main
  class="appMain"
  [class.appMain--guest]="!session.isAuthenticated()"
>
  <router-outlet></router-outlet>
</main>
