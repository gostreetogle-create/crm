<header class="appHeader">
  <a routerLink="/" class="brand" aria-label="Sporting Yoga — CRM, на главный экран">
    <img
      class="brandLogo"
      src="/branding/sporting-yoga-mark.svg"
      width="40"
      height="40"
      alt=""
      decoding="async"
    />
    <span class="brandWord">
      <span class="brandWordPrefix">CR</span><span class="brandWordAccent">M</span>
    </span>
  </a>

  <nav class="mainNav" aria-label="Main navigation">
    @if (canPage('page.dictionaries')) {
      <a routerLink="/dictionaries" routerLinkActive="isActive">Справочники</a>
    }
    @if (canPage('page.demo')) {
      <a routerLink="/demo" routerLinkActive="isActive">Demo</a>
    }
    @if (canPage('page.admin.settings')) {
      <a routerLink="/settings" routerLinkActive="isActive">Админ-настройки</a>
    }
  </nav>

  <div class="headerRight">
    @if (canPage('page.preferences')) {
      <a
        routerLink="/preferences"
        routerLinkActive="isActive"
        class="iconNavBtn"
        aria-label="Настройки приложения"
        title="Настройки"
      >
        <svg lucideSettings [size]="18" aria-hidden="true"></svg>
      </a>
    }
    <ng-content></ng-content>
    <button type="button" class="logoutBtn" (click)="logout()">Выйти</button>
  </div>
</header>
