<header class="appHeader">
  <a routerLink="/dictionaries" class="brand" aria-label="Sporting Yoga — CRM, к справочникам">
    <img
      class="brandLogo"
      src="/branding/sporting-yoga-mark.svg"
      width="40"
      height="40"
      alt=""
      decoding="async"
    />
    <span class="brandWord">
      <span class="brandWordPrefix">CR</span><span class="brandWordAccent">M</span>
    </span>
  </a>

  <nav class="mainNav" aria-label="Main navigation">
    <a routerLink="/dictionaries" routerLinkActive="isActive">Справочники</a>
    <a routerLink="/demo" routerLinkActive="isActive">Demo</a>
  </nav>

  <div class="headerRight">
    <button type="button" class="logoutBtn" (click)="logout()">Выйти</button>
    <ng-content></ng-content>
  </div>
</header>
