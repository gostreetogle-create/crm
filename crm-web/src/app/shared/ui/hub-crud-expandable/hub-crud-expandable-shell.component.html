<div
  class="hubCrudExpandable"
  [class.hubCrudExpandable--open]="expand.isOpen(tileKey)"
>
  <div
    class="hubCrudExpandable__anchor"
    [class.hubCrudExpandable__anchor--open]="expand.isOpen(tileKey)"
    [style.min-height]="expand.isOpen(tileKey) ? layoutReserveWhenOpen : null"
  >
    <div
      class="hubCrudExpandable__panel"
      [class.hubCrudExpandable__panel--open]="expand.isOpen(tileKey)"
    >
      <ng-content />
    </div>
  </div>
  <button
    type="button"
    class="hubCrudExpandable__toggle"
    [attr.aria-expanded]="expand.isOpen(tileKey)"
    [attr.aria-label]="ariaLabel"
    (click)="expand.toggle(tileKey)"
  >
    <svg lucideMenu [size]="20" aria-hidden="true"></svg>
  </button>
</div>
