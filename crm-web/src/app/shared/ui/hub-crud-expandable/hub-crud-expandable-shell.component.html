<div
  class="hubCrudExpandable"
  [class.hubCrudExpandable--open]="isExpanded()"
>
  <div
    class="hubCrudExpandable__anchor"
    [class.hubCrudExpandable__anchor--open]="isExpanded()"
    [style.min-height]="anchorMinHeightWhenOpen()"
  >
    <div
      class="hubCrudExpandable__panel"
      [class.hubCrudExpandable__panel--open]="isExpanded()"
    >
      <ng-content />
      <button
        type="button"
        class="hubCrudExpandable__toggle"
        [attr.aria-expanded]="isExpanded()"
        [attr.aria-label]="ariaLabel()"
        (click)="onToggleClick($event)"
      >
        <svg lucideMenu [size]="20" aria-hidden="true"></svg>
      </button>
    </div>
  </div>
</div>
