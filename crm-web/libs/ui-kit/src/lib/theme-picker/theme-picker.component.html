<button
  type="button"
  class="themeToggleBtn"
  (click)="toggleTheme()"
  [attr.aria-label]="isDark() ? 'Переключить на светлую тему' : 'Переключить на темную тему'"
  [attr.title]="isDark() ? 'Светлая тема' : 'Темная тема'"
>
  @if (isDark()) {
    <svg lucideSun [size]="18"></svg>
  } @else {
    <svg lucideMoon [size]="18"></svg>
  }
</button>
