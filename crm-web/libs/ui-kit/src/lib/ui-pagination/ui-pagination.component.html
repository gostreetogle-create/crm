<nav class="pagination" *ngIf="pageCount > 1" aria-label="Пагинация">
  <app-ui-button
    variant="soft"
    [square]="true"
    [disabled]="!canPrev()"
    (clicked)="go(page - 1)"
    aria-label="Предыдущая страница"
  >
    <span class="paginationIcon paginationIcon--prevNext" aria-hidden="true"
      ><svg lucideChevronLeft [size]="22"></svg
    ></span>
  </app-ui-button>

  <div class="pages" role="group" aria-label="Номера страниц">
    <ng-container *ngFor="let item of pagesWithGaps()">
      <span *ngIf="item === 'gap'" class="pagination__ellipsis" aria-hidden="true">…</span>
      <app-ui-button
        *ngIf="item !== 'gap' && item !== pageCount"
        [variant]="item === page ? 'primary' : 'soft'"
        [square]="true"
        (clicked)="go(item)"
        [attr.aria-current]="item === page ? 'page' : null"
        [attr.aria-label]="'Страница ' + item"
      >
        {{ item }}
      </app-ui-button>
      <button
        *ngIf="item !== 'gap' && item === pageCount"
        type="button"
        class="pagination__lastPage"
        [class.pagination__lastPage--current]="page === pageCount"
        (click)="go(item)"
        [attr.aria-current]="page === pageCount ? 'page' : null"
        [attr.aria-label]="'Последняя страница, ' + pageCount"
      >
        {{ item }}
      </button>
    </ng-container>
  </div>

  <app-ui-button
    variant="soft"
    [square]="true"
    [disabled]="!canNext()"
    (clicked)="go(page + 1)"
    aria-label="Следующая страница"
  >
    <span class="paginationIcon paginationIcon--prevNext" aria-hidden="true"
      ><svg lucideChevronRight [size]="22"></svg
    ></span>
  </app-ui-button>
</nav>
