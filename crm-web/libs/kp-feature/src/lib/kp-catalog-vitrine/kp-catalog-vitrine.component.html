<section class="kp-vitrine" aria-label="Коммерческое предложение, витрина каталога">
  <header class="kp-vitrine__pageToolbar kp-no-print">
    <h1 class="kp-vitrine__pageTitle">Коммерческое предложение</h1>
  </header>

  <div class="kp-vitrine__toolbar">
    <div class="kp-vitrine__filtersWrap">
      <app-filters-bar
        searchPlaceholder="Поиск по товарам / артикулу..."
        [sortOptions]="productSortOptions"
        [filterOptions]="productCategoryOptions()"
        [secondaryFilterOptions]="productSubcategoryOptions()"
        [selectedSort]="productSort()"
        [selectedFilter]="productCategory()"
        [selectedSecondaryFilter]="productSubcategory()"
        (searchChange)="onProductSearch($event)"
        (sortChange)="onProductSortChange($event)"
        (filterChange)="onProductCategory($event)"
        (secondaryFilterChange)="onProductSubcategory($event)"
      ></app-filters-bar>
    </div>

    <div class="kp-vitrine__toolbarExtra">
      <label class="kp-vitrine__pageSize">
        <span class="kp-vitrine__pageSizeLabel">На странице</span>
        <select
          class="kp-vitrine__pageSizeSelect"
          [value]="productPageSize()"
          (change)="onProductPageSizeChange($any($event.target).value)"
          aria-label="Количество карточек на странице"
        >
          @for (n of pageSizeOptions; track n) {
            <option [value]="n">{{ n }}</option>
          }
        </select>
      </label>
      <div class="kp-vitrine__paginationWrap">
        <app-ui-pagination
          [page]="productPage()"
          [pageCount]="productPageCount()"
          (pageChange)="onProductPageChange($event)"
        ></app-ui-pagination>
      </div>
    </div>
  </div>

  <div class="kp-vitrine__grid">
    @for (p of visibleProducts(); track p.id) {
      <app-product-card
        [title]="p.title"
        [subtitle]="cardMetaLine(p)"
        skuLabel="Артикул"
        [skuValue]="p.sku"
        [price]="formatPrice(p.price)"
        [imageSrc]="imageUrl(p)"
      >
        <div product-actions>
          <app-ui-button
            type="button"
            variant="soft"
            [square]="true"
            [disabled]="p.source !== 'trade_good'"
            aria-label="Редактировать товар в справочнике"
            [title]="
              p.source === 'trade_good'
                ? 'Редактировать в справочнике'
                : 'Доступно только для товаров из справочника «Товары» (не демо)'
            "
            (clicked)="onEditInDictionary(p)"
          >
            <svg lucidePencil [size]="18"></svg>
          </app-ui-button>
          <app-ui-button
            type="button"
            variant="primary"
            [square]="true"
            aria-label="Добавить в коммерческое предложение"
            title="В КП"
            (clicked)="onAddToKp(p)"
          >
            <svg lucideShoppingCart [size]="18"></svg>
          </app-ui-button>
        </div>
      </app-product-card>
    }
  </div>
</section>
