<app-page-shell [fluid]="true">
  <div class="kp-builder">
    <div class="kp-builder__split">
      <aside class="kp-builder__catalog kp-no-print" aria-label="Товары для подбора в КП">
        <app-kp-catalog-vitrine
          [catalogProducts]="kpCatalogProducts()"
          (addToKp)="addFromVitrine($event)"
          (editInDictionary)="navigateToEditTradeGood($event)"
        />
      </aside>

      <div class="kp-builder__column-right">
        <div class="kp-builder__sheet-toolbar kp-no-print" aria-label="Параметры листа и позиции КП">
          <div class="kp-builder__recipient-row">
            <app-kp-recipient-toolbar
              [organizations]="organizations()"
              [clients]="clients()"
              [recipientCtrl]="form.controls.recipient"
              [organizationSearchCtrl]="form.controls.organizationSearch"
              [organizationContactIdCtrl]="form.controls.organizationContactId"
            />
          </div>
          <div class="kp-builder__positions-actions">
            <div class="kp-builder__print-action">
              <app-ui-button type="button" variant="primary" (clicked)="print()">
                <span class="kp-builder__btn-with-icon">
                  <svg lucidePrinter [size]="18" aria-hidden="true"></svg>
                  Печать / PDF
                </span>
              </app-ui-button>
            </div>
          </div>
        </div>

        <section class="kp-builder__preview-wrap" aria-label="Предпросмотр коммерческого предложения">
          <div
            class="kp-builder__preview"
            #previewHost
            [style.--kp-preview-zoom]="previewZoom()"
          >
            <div class="kp-builder__preview-zoom">
              <app-kp-document-template
                [linesForm]="lines()"
                [organizations]="organizations()"
                [clients]="clients()"
                [recipientCtrl]="form.controls.recipient"
                [organizationContactIdCtrl]="form.controls.organizationContactId"
                [vatPercentCtrl]="form.controls.vatPercent"
                [vatAmountCtrl]="form.controls.vatAmount"
                [contentPaddingTop]="contentPaddingTop"
                [contentPaddingTopPage2]="contentPaddingTopPage2"
                [rowsPerPageCtrl]="form.controls.rowsPerPage"
                [photoThumbMaxPxCtrl]="form.controls.photoThumbMaxPx"
                (addLineClick)="addLine()"
              />
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</app-page-shell>
