services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      # Имя CRM_* чтобы пустая переменная POSTGRES_PASSWORD в Windows не ломала подстановку.
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: crm
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm -d crm']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: crm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://crm:${CRM_POSTGRES_PASSWORD:-crm}@postgres:5432/crm?schema=public
      BACKUP_DIR: /var/lib/crm/backups
    volumes:
      - crm_backups:/var/lib/crm/backups
    ports:
      - "${BACKEND_PORT}:3000"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health > /dev/null || exit 1']
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        WEB_BUILD_ID: ${WEB_BUILD_ID:-unknown}
    container_name: crm_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:80"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/ > /dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  crm_pgdata:
  crm_backups:
