services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      # Имя CRM_* чтобы пустая переменная POSTGRES_PASSWORD в Windows не ломала подстановку.
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: crm
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm -d crm']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: crm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      # Не создавать слабого пользователя director/director при seed в контейнере.
      SEED_DIRECTOR_USER: "0"
      # Должен совпадать с паролем пользователя crm в уже существующем volume Postgres (смена CRM_POSTGRES_PASSWORD в .env без сброса volume ломает подключение).
      DATABASE_URL: postgresql://crm:${CRM_POSTGRES_PASSWORD:-crm}@postgres:5432/crm?schema=public
      # Тот же DSN без ?schema= для pg_dump/pg_restore; пусто — в коде отрежется query у DATABASE_URL.
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:-}
      BACKUP_DIR: /var/lib/crm/backups
    volumes:
      - crm_backups:/var/lib/crm/backups
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      # 127.0.0.1 — надёжнее localhost на некоторых образах; migrate+seed на слабом VPS могут занять минуту+.
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: crm_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Готовая статика с хоста (загрузите dist/crm-web/browser/ — см. deploy/README.md). Не коммитится в git.
    volumes:
      - ./prebuilt-web:/usr/share/nginx/html:ro
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/ > /dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  crm_pgdata:
  crm_backups:
