services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: crm_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health > /dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        WEB_BUILD_ID: ${WEB_BUILD_ID:-unknown}
    container_name: crm_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

