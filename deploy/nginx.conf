server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Backend API (future-friendly)
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # MVP: frontend contract expects this path without /api prefix.
  location = /material-geometry/model {
    proxy_pass http://backend:3000/material-geometry/model;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Статика из public (не подменять index.html при 404 — иначе фон/картинки получают HTML).
  location ^~ /branding/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # Static Angular build artifacts: if missing -> 404 (avoid text/html for JS chunks).
  location ~* \.(?:js|mjs|css|map|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA shell: no-cache (so users don't get stale HTML after deploy).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }
}

