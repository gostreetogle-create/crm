server {
  listen 80;
  server_name _;
  client_max_body_size 25m;
  gzip on;
  gzip_min_length 1000;
  gzip_comp_level 6;
  gzip_types application/json application/javascript text/css text/html;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # Backend API (future-friendly)
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Фото товаров и КП: отдаёт backend из TRADE_GOODS_PHOTOS_DIR / KP_PHOTOS_DIR (не из статики SPA).
  location ^~ /media/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # MVP: frontend contract expects this path without /api prefix.
  location = /material-geometry/model {
    proxy_pass http://backend:3000/material-geometry/model;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Статика из public (не подменять index.html при 404 — иначе фон/картинки получают HTML).
  # Фото КП: кладите файлы в crm-web/public/kp-media/ — сборка кладёт их в /kp-media/ (без отдельного Docker-volume).
  location ^~ /branding/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # Static Angular build artifacts: if missing -> 404 (avoid text/html for JS chunks).
  location ~* \.(?:js|mjs|css|map|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA shell: no-cache (so users don't get stale HTML after deploy).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri =404;
  }

  # SPA: любые пути без реального файла (в т.ч. /справочники) → внутренний переход на index.html.
  location @spa {
    rewrite ^ /index.html last;
  }

  location / {
    try_files $uri $uri/ @spa;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }
}

