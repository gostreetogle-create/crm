# Запуск из корня репозитория (например /volume1/docker/crm):
#   docker compose up -d
# В корне есть `.env` с CRM_POSTGRES_PASSWORD (иначе Postgres: «superuser password is not specified»).
# Альтернатива: docker compose --env-file deploy/.env up -d (см. deploy/.env.example).
# Секреты и CORS для полного стека — в deploy/.env.
# Cloudflare Tunnel не в этом compose: поднимайте отдельно из ../tunnel (токен в tunnel/.env).
services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${CRM_POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: crm
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm -d crm']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: crm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      SEED_DIRECTOR_USER: "0"
      DATABASE_URL: postgresql://crm:${CRM_POSTGRES_PASSWORD:-crm}@postgres:5432/crm?schema=public
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:-}
      CRM_DEPLOY_DIR: ${CRM_DEPLOY_DIR:-/opt/crm/deploy}
      BACKUP_DIR: /var/lib/crm/backups
    volumes:
      # Фото товаров и КП, чтобы `/media/*` читались с хоста и не терялись при пересоздании контейнера.
      - ./backend/uploads:/app/uploads
      - crm_backups:/var/lib/crm/backups
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    container_name: crm_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./deploy/prebuilt-web:/usr/share/nginx/html:ro
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/ > /dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  crm_pgdata:
  crm_backups:
